# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.11.0'

jobs:
  analyze:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtimageformats qtpdf qtpositioning qtwebchannel qtwebengine

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 clang-tidy-18 \
            libxcb1-dev libx11-xcb-dev libxkbcommon-dev \
            libgl1-mesa-dev

      - name: Configure
        run: |
          cmake -B build -S Fernanda \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find Fernanda/src -name '*.cpp' | xargs \
            clang-tidy-18 -p build --quiet 2>&1 | tee clang-tidy-output.txt

          if grep -q 'warning:' clang-tidy-output.txt; then
            echo "::warning::clang-tidy found issues"
            exit 1
          fi