<!doctype html>
<meta charset="utf-8">
<html lang="en">
<head>
    <link rel="stylesheet" href="include/github-markdown.min.css">
    <link rel="stylesheet" href="markdown-overwrite.css">
    <script src="include/marked.min.js"></script>
    <script src="qrc:/qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div id="text_area"></div>
    <script>
        'use strict';
        var text_area = document.getElementById('text_area');
        var updateText = function (text) {
            text_area.innerHTML = '<div class="markdown-body" width="100%">' + marked.parse(text) + '</div>';
        }
        new QWebChannel(qt.webChannelTransport,
            function (channel) {
                var content = channel.objects.content;
                updateText(content.text);
                content.textChanged.connect(updateText);
            }
        );
    </script>
</body>
</html>
